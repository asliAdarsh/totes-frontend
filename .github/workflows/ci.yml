name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build & Push Frontend Image
        run: |
          # Login to Docker Hub
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          

          docker build -t asliadarsh/todo-frontend:${{ github.sha }} .

          
          docker push asliadarsh/todo-frontend:${{ github.sha }}
